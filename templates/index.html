<!DOCTYPE html>
<html>
<head>
    <title>Piropos 💘</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: #ffe6f0;
        }
        .card {
            margin-top: 100px;
            padding: 30px;
            background: white;
            display: inline-block;
            border-radius: 15px;
            box-shadow: 0px 0px 10px gray;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background: hotpink;
            color: white;
            border: none;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>💘 Piropo del día 💘</h1>
    <p>{{ piropo }}</p>

    <form method="POST">
        <button>Otro piropo 🔄</button>
    </form>
</div>

</body>
</html>
